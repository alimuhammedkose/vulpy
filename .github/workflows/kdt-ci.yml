name: KDT CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup KDT
        run: |
          curl -sSL https://cli.kondukto.io | sh
          echo "KONDUKTO_HOST=${{ secrets.KONDUKTO_HOST }}" >> $GITHUB_ENV
          echo "KONDUKTO_TOKEN=${{ secrets.KONDUKTO_TOKEN }}" >> $GITHUB_ENV


      - name: Create Project
        run: |
          kdt create project \
            -a github \
            -r ${{ github.server_url }}/${{ github.repository }} || exit-code 0
            
      - name: Run a SAST scan
        run: |
          kdt scan \
            -p ${{ github.event.repository.name }} \
            -t bandit \
            -b ${GITHUB_REF#refs/heads/} \
            --async
            
      - name: Run a SCA scan
        run: |
          kdt scan \
            -p ${{ github.event.repository.name }} \
            -t osvscannersca \
            -b ${GITHUB_REF#refs/heads/} \
            --async
